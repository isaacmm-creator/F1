<!DOCTYPE html>
<html lang="es">

    <title>F1 Experience</title>
    <link rel="stylesheet" href="style.css">
</head>
<link rel="icon" href="" type="image/png">
<body>

    <!-- NAVBAR -->
    <nav>
        <h2>F1 Experience</h2>
        <ul>
            <li><a href="#">Inicio</a></li>
            <li><a href="#">Pilotos</a></li>
            <li><a href="#">Calendario</a></li>
        </ul>
    </nav>

            </div>

                <img src="https://prrsnews.com/wp-content/uploads/2022/08/charles-leclerc-ferrari.jpg">

    <section class="calendario">
